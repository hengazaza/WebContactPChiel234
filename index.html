  <script>

    const WAVE_CONFIG = {

      speed: 1,


      amplitude: 50,


      bgGradient: ['#1a237e', '#1565c0', '#0097a7', '#00695c'],


      waves: [

        ['#1565c0', 0.35, 0.6, 0.55],
        ['#0097a7', 0.50, 0.4, 0.50],
        ['#1a237e', 0.62, 0.8, 0.45],
        ['#00838f', 0.74, 0.3, 0.40],
        ['#004d40', 0.85, 0.5, 0.35],

      ],

    };


    const canvas = document.getElementById('bg-canvas');
    const ctx    = canvas.getContext('2d');
    let t = 0;

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function hexToRgb(hex) {
      return [
        parseInt(hex.slice(1,3), 16),
        parseInt(hex.slice(3,5), 16),
        parseInt(hex.slice(5,7), 16),
      ].join(',');
    }

    function draw() {
      const W = canvas.width, H = canvas.height;
      ctx.clearRect(0, 0, W, H);


      const g = ctx.createLinearGradient(0, 0, W, H);
      const bg = WAVE_CONFIG.bgGradient;
      g.addColorStop(0,   bg[0]);
      g.addColorStop(0.4, bg[1]);
      g.addColorStop(0.7, bg[2]);
      g.addColorStop(1,   bg[3]);
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);


      WAVE_CONFIG.waves.forEach(([color, yRatio, spd, alpha], i) => {
        const y0  = H * yRatio;
        const rgb = hexToRgb(color);
        const ph  = i * 1.2;

        ctx.beginPath();
        for (let x = 0; x <= W; x += 2) {
          const y = y0
            + Math.sin(x * 0.011 + t * spd * WAVE_CONFIG.speed + ph) * WAVE_CONFIG.amplitude
            + Math.sin(x * 0.017 + t * spd * WAVE_CONFIG.speed * 0.7 + ph + 1) * (WAVE_CONFIG.amplitude * 0.4);
          x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.lineTo(W, H);
        ctx.lineTo(0, H);
        ctx.closePath();
        ctx.fillStyle = `rgba(${rgb},${alpha})`;
        ctx.fill();
      });


      const shimmer = ctx.createRadialGradient(W*0.3, H*0.15, 0, W*0.3, H*0.15, W*0.55);
      shimmer.addColorStop(0, 'rgba(255,255,255,0.05)');
      shimmer.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = shimmer;
      ctx.fillRect(0, 0, W, H);

      t += 0.012;
      requestAnimationFrame(draw);
    }

    draw();

  </script>
